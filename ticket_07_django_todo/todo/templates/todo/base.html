<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Список дел</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px auto; max-width: 700px; padding: 0 10px; }
        .task { padding: 12px; border: 1px solid #ddd; margin-bottom: 8px; border-radius: 4px; display: flex; align-items: center; gap: 10px; }
        .task.done { background: #f0f0f0; }
        .task.done .task-title { text-decoration: line-through; color: #888; }
        .task-title { flex: 1; }
        input[type=text] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 14px; background: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; text-decoration: none; font-size: 14px; }
        .btn-done { background: #28a745; }
        .btn-undo { background: #888; }
        .btn-del { background: #cc0000; }
    </style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
