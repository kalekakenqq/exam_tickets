<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Блог</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f5f5f5; }
        nav { background: #333; padding: 10px 20px; }
        nav a { color: white; margin-right: 15px; text-decoration: none; }
        .content { padding: 20px; max-width: 800px; margin: 0 auto; }
        .post-card { background: white; border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 4px; }
        .post-card h2 { margin: 0 0 5px; }
        .post-card h2 a { color: #333; text-decoration: none; }
        .post-card h2 a:hover { color: #0066cc; }
        .date { color: #666; font-size: 0.85em; }
        a.back { color: #0066cc; }
    </style>
</head>
<body>
<nav>
    <a href="{% url 'post_list' %}">все посты</a>
    <a href="{% url 'admin:index' %}">админка</a>
</nav>
<div class="content">
    {% block content %}{% endblock %}
</div>
</body>
</html>
