{% extends 'base.html' %}
{% block content %}
<h1>Корзина</h1>
{% if items %}
{% for item in items %}
<div class="item">
    <span>{{ item.name }} — {{ item.price }} руб.</span>
    <a href="/remove/{{ item.id }}" class="del">удалить</a>
</div>
{% endfor %}
<p class="total">Итого: {{ total }} руб.</p>
<a href="/clear" class="del">очистить корзину</a>
{% else %}
<p>Корзина пуста. <a href="/">Перейти в каталог</a></p>
{% endif %}
{% endblock %}
